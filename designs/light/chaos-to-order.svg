<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" fill="none">
  <!-- FLAGSHIP back print. particles resolve chaos -> ordered lattice. one ember focal node. -->
  <!-- chaos field (left): scattered, varied size & opacity -->
  <g fill="#08090C">
    <circle cx="70"  cy="60"  r="3" opacity=".45"/>
    <circle cx="110" cy="130" r="5" opacity=".7"/>
    <circle cx="95"  cy="210" r="2" opacity=".4"/>
    <circle cx="150" cy="90"  r="4" opacity=".6"/>
    <circle cx="180" cy="175" r="3" opacity=".5"/>
    <circle cx="140" cy="250" r="5" opacity=".6"/>
    <circle cx="210" cy="55"  r="2" opacity=".4"/>
    <circle cx="230" cy="120" r="4" opacity=".7"/>
    <circle cx="200" cy="230" r="3" opacity=".5"/>
    <circle cx="260" cy="170" r="5" opacity=".6"/>
    <circle cx="290" cy="90"  r="3" opacity=".5"/>
    <circle cx="300" cy="250" r="2" opacity=".4"/>
    <circle cx="330" cy="140" r="4" opacity=".6"/>
    <circle cx="360" cy="205" r="3" opacity=".55"/>
    <circle cx="380" cy="80"  r="2" opacity=".4"/>
    <circle cx="410" cy="255" r="3" opacity=".5"/>
    <circle cx="395" cy="160" r="4" opacity=".6"/>
  </g>
  <!-- transition: drifting toward alignment -->
  <g fill="#08090C" opacity=".75">
    <circle cx="470" cy="92"  r="4"/>
    <circle cx="500" cy="160" r="3"/>
    <circle cx="528" cy="232" r="4"/>
    <circle cx="455" cy="205" r="3"/>
    <circle cx="540" cy="112" r="3"/>
    <circle cx="558" cy="270" r="3"/>
  </g>
  <!-- ordered lattice (right): grid + connecting rules -->
  <g stroke="#08090C" stroke-opacity=".28" stroke-width="1.5">
    <line x1="610" y1="70"  x2="910" y2="70"/>
    <line x1="610" y1="135" x2="910" y2="135"/>
    <line x1="610" y1="200" x2="910" y2="200"/>
    <line x1="610" y1="265" x2="910" y2="265"/>
    <line x1="610" y1="70" x2="610" y2="265"/>
    <line x1="685" y1="70" x2="685" y2="265"/>
    <line x1="760" y1="70" x2="760" y2="265"/>
    <line x1="835" y1="70" x2="835" y2="265"/>
    <line x1="910" y1="70" x2="910" y2="265"/>
  </g>
  <g fill="#08090C">
    <circle cx="610" cy="70"  r="4"/><circle cx="685" cy="70"  r="4"/><circle cx="760" cy="70"  r="4"/><circle cx="835" cy="70"  r="4"/><circle cx="910" cy="70"  r="4"/>
    <circle cx="610" cy="135" r="4"/><circle cx="685" cy="135" r="4"/><circle cx="760" cy="135" r="4"/><circle cx="835" cy="135" r="4"/><circle cx="910" cy="135" r="4"/>
    <circle cx="610" cy="200" r="4"/><circle cx="685" cy="200" r="4"/><circle cx="835" cy="200" r="4"/><circle cx="910" cy="200" r="4"/>
    <circle cx="610" cy="265" r="4"/><circle cx="685" cy="265" r="4"/><circle cx="760" cy="265" r="4"/><circle cx="835" cy="265" r="4"/><circle cx="910" cy="265" r="4"/>
  </g>
  <!-- ember focal node -->
  <circle cx="760" cy="200" r="9" fill="#C2410C"/>
  <circle cx="760" cy="200" r="16" fill="none" stroke="#C2410C" stroke-opacity=".4" stroke-width="1.5"/>

  <!-- trilingual lockup -->
  <text x="500" y="360" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="22"
        letter-spacing="6" fill="#8A8F98">ПОРЯДОК ИЗ ХАОСА</text>
  <text x="500" y="412" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="46" font-weight="700"
        letter-spacing="2" fill="#08090C">ORDER FROM CHAOS</text>
  <text x="500" y="452" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="22"
        letter-spacing="10" fill="#8A8F98">从 混 沌 到 秩 序</text>
</svg>
