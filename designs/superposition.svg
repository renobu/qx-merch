<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 410" fill="none">
  <!-- Bloch sphere. "still in superposition". state vector in ember. -->
  <circle cx="220" cy="160" r="120" stroke="#ECECEC" stroke-opacity=".55" stroke-width="2"/>
  <ellipse cx="220" cy="160" rx="120" ry="34" stroke="#ECECEC" stroke-opacity=".3" stroke-width="1.5" stroke-dasharray="5 6"/>
  <line x1="220" y1="40" x2="220" y2="280" stroke="#ECECEC" stroke-opacity=".3" stroke-width="1.5"/>
  <line x1="100" y1="160" x2="340" y2="160" stroke="#ECECEC" stroke-opacity=".18" stroke-width="1.5"/>
  <!-- poles -->
  <text x="220" y="30"  text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="20" fill="#8A8F98">|0⟩</text>
  <text x="220" y="305" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="20" fill="#8A8F98">|1⟩</text>
  <!-- projection (dashed) -->
  <line x1="300" y1="95" x2="300" y2="178" stroke="#ECECEC" stroke-opacity=".3" stroke-width="1.4" stroke-dasharray="4 5"/>
  <line x1="220" y1="160" x2="300" y2="178" stroke="#ECECEC" stroke-opacity=".3" stroke-width="1.4" stroke-dasharray="4 5"/>
  <!-- state vector -->
  <line x1="220" y1="160" x2="300" y2="95" stroke="#F4702F" stroke-width="3" stroke-linecap="round"/>
  <polygon points="300,95 293,109 285,99" fill="#F4702F"/>
  <circle cx="220" cy="160" r="4" fill="#ECECEC"/>

  <text x="220" y="360" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="28" font-weight="700"
        letter-spacing="1" fill="#ECECEC">still in superposition</text>
  <text x="220" y="392" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="17"
        letter-spacing="1" fill="#8A8F98">|ψ⟩ = α|0⟩ + β|1⟩</text>
</svg>
