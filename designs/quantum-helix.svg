<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 660" fill="none">
  <!-- HERO. DNA double helix (genetics) unwinding into a quantum wire + gate (Q#). ties Qubithelix. -->
  <!-- rungs -->
  <g stroke="#ECECEC" stroke-opacity=".22" stroke-width="1.5">
    <line x1="90" y1="80"  x2="270" y2="80"/>
    <line x1="90" y1="160" x2="270" y2="160"/>
    <line x1="90" y1="240" x2="270" y2="240"/>
    <line x1="90" y1="320" x2="270" y2="320"/>
    <line x1="90" y1="400" x2="270" y2="400"/>
    <line x1="90" y1="480" x2="270" y2="480"/>
  </g>
  <!-- strand A -->
  <path d="M180,40 C300,60 300,100 180,120 C60,140 60,180 180,200 C300,220 300,260 180,280
           C60,300 60,340 180,360 C300,380 300,420 180,440 C60,460 60,500 180,520"
        stroke="#ECECEC" stroke-width="3" stroke-linecap="round"/>
  <!-- strand B -->
  <path d="M180,40 C60,60 60,100 180,120 C300,140 300,180 180,200 C60,220 60,260 180,280
           C300,300 300,340 180,360 C60,380 60,420 180,440 C300,460 300,500 180,520"
        stroke="#ECECEC" stroke-width="3" stroke-linecap="round"/>
  <!-- crossing nodes -->
  <g fill="#ECECEC">
    <circle cx="180" cy="40"  r="4"/><circle cx="180" cy="120" r="4"/><circle cx="180" cy="200" r="4"/>
    <circle cx="180" cy="280" r="4"/><circle cx="180" cy="360" r="4"/><circle cx="180" cy="440" r="4"/>
    <circle cx="180" cy="520" r="4"/>
    <circle cx="92"  cy="80"  r="3"/><circle cx="92" cy="240" r="3"/><circle cx="92" cy="400" r="3"/>
    <circle cx="268" cy="160" r="3"/><circle cx="268" cy="320" r="3"/><circle cx="268" cy="480" r="3"/>
  </g>
  <!-- ember tips -->
  <circle cx="268" cy="80"  r="5" fill="#F4702F"/>
  <circle cx="92"  cy="320" r="5" fill="#F4702F"/>

  <!-- unwind into a quantum wire + H gate + measurement -->
  <line x1="180" y1="520" x2="180" y2="640" stroke="#ECECEC" stroke-width="3" stroke-linecap="round"/>
  <rect x="154" y="548" width="52" height="48" rx="4" fill="none" stroke="#ECECEC" stroke-width="3"/>
  <text x="180" y="582" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="30" font-weight="700" fill="#ECECEC">H</text>
  <circle cx="180" cy="640" r="7" fill="#F4702F"/>
</svg>
