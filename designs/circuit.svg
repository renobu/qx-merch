<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 130" fill="none">
  <!-- sleeve strip. a tiny Q# circuit: H, X, CNOT, measure. -->
  <text x="20" y="20" font-family="ui-monospace,Menlo,monospace" font-size="16" letter-spacing="3" fill="#8A8F98">Q#</text>
  <text x="12" y="52"  font-family="ui-monospace,Menlo,monospace" font-size="18" fill="#8A8F98">|0⟩</text>
  <text x="12" y="102" font-family="ui-monospace,Menlo,monospace" font-size="18" fill="#8A8F98">|0⟩</text>
  <!-- wires -->
  <line x1="48" y1="45" x2="660" y2="45" stroke="#ECECEC" stroke-opacity=".5" stroke-width="2"/>
  <line x1="48" y1="95" x2="660" y2="95" stroke="#ECECEC" stroke-opacity=".5" stroke-width="2"/>
  <!-- H gate (q0) -->
  <rect x="98" y="23" width="44" height="44" rx="3" fill="none" stroke="#ECECEC" stroke-width="2.5"/>
  <text x="120" y="56" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="26" font-weight="700" fill="#ECECEC">H</text>
  <!-- X gate (q1) -->
  <rect x="178" y="73" width="44" height="44" rx="3" fill="none" stroke="#ECECEC" stroke-width="2.5"/>
  <text x="200" y="106" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="26" font-weight="700" fill="#ECECEC">X</text>
  <!-- CNOT: control q0 -> target q1 -->
  <line x1="330" y1="45" x2="330" y2="95" stroke="#F4702F" stroke-width="2.5"/>
  <circle cx="330" cy="45" r="6" fill="#F4702F"/>
  <circle cx="330" cy="95" r="15" fill="none" stroke="#F4702F" stroke-width="2.5"/>
  <line x1="330" y1="82" x2="330" y2="108" stroke="#F4702F" stroke-width="2.5"/>
  <line x1="317" y1="95" x2="343" y2="95" stroke="#F4702F" stroke-width="2.5"/>
  <!-- measurement (q0) -->
  <rect x="556" y="23" width="52" height="44" rx="3" fill="none" stroke="#ECECEC" stroke-width="2.5"/>
  <path d="M566 56 a16 16 0 0 1 32 0" fill="none" stroke="#ECECEC" stroke-width="2"/>
  <line x1="582" y1="56" x2="598" y2="34" stroke="#ECECEC" stroke-width="2"/>
</svg>
